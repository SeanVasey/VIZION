name: Release

# Cut a tagged GitHub Release whenever the version in package.json changes on
# main.  The release notes are extracted from the matching CHANGELOG.md section,
# so the changelog stays the single source of truth for what shipped.
#
# Release procedure (see docs/runbooks/release.md): bump package.json and cut
# the [Unreleased] section into a dated `## [x.y.z]` heading in the same PR;
# merging to main does the rest here.

on:
  push:
    branches: [main]
    paths: [package.json]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-and-release:
    name: tag + GitHub release from CHANGELOG
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether v${{ steps.pkg.outputs.version }} is already tagged
        id: tag
        run: |
          if git rev-parse -q --verify "refs/tags/v${{ steps.pkg.outputs.version }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG.md
        if: steps.tag.outputs.exists == 'false'
        run: |
          # Print the body of the `## [<version>]` section (up to the next `## `).
          awk -v ver="${{ steps.pkg.outputs.version }}" '
            $0 ~ "^## \\[" ver "\\]" { grab = 1; next }
            grab && /^## /           { exit }
            grab                     { print }
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "No CHANGELOG.md section found for ${{ steps.pkg.outputs.version }}" >&2
            echo "Add a '## [${{ steps.pkg.outputs.version }}] - YYYY-MM-DD' section before bumping." >&2
            exit 1
          fi

      - name: Create tag + GitHub release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "VIZ(IO)N v${{ steps.pkg.outputs.version }}" \
            --notes-file release-notes.md

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · test · build · audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Generate icons
        run: npm run generate:icons

      - name: Unit tests
        run: npm run test

      - name: Build (compiles the service worker via prebuild)
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E tests
        run: npm run test:e2e

      - name: Security audit (production dependencies)
        # Audit what actually ships. Dev/build tooling (esbuild via vite/vitest)
        # carries advisories that only affect a running dev server / Deno, never
        # the deployed runtime; a full-tree report is run separately as advisory.
        run: npm audit --omit=dev --audit-level=high

      - name: Security audit (full tree, advisory only)
        run: npm audit || true

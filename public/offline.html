<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0F1012" />
    <title>VIZ(IO)N — Offline</title>
    <style>
      /* Static, token-mirrored fallback: follows the OS scheme (no JS theme
         store here) and pads the safe areas — this is a full-bleed surface. */
      :root {
        color-scheme: dark light;
        --void: #0f1012;
        --chalk: #f2f3f6;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --void: #eef0f4;
          --chalk: #0f1012;
        }
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: calc(1.5rem + env(safe-area-inset-top, 0px)) 1.5rem
          calc(1.5rem + env(safe-area-inset-bottom, 0px));
        background: var(--void);
        color: var(--chalk);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        line-height: 1.5;
        text-align: center;
      }
      main {
        max-width: 28rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        letter-spacing: 0.02em;
      }
      p {
        margin: 0;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>VIZ(IO)N</h1>
      <p>VIZ(IO)N is offline — your saved work is safe on the server.</p>
    </main>
    <script>
      // Self-recover: reload into the app the moment connectivity returns.
      window.addEventListener("online", function () {
        window.location.replace("/");
      });
    </script>
  </body>
</html>
